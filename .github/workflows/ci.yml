name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Bundle action
        run: npm run package

      - name: Verify committed bundle is current
        run: git diff --exit-code -- dist

      - name: Create package fixture
        run: dotnet new classlib --framework net8.0 --name MyLibrary --output .tmp/ci-fixture/MyLibrary

      - name: Smoke test local action
        uses: ./
        with:
          package-projects: .tmp/ci-fixture/MyLibrary/MyLibrary.csproj
          artifacts-directory: .tmp/artifacts
          local-feed-directory: .tmp/feed

      - name: Audit production dependencies
        run: npm audit --omit=dev
