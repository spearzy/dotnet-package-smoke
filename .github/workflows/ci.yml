name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Bundle action
        run: npm run package

      - name: Commit bundle if changed (Dependabot)
        if: github.actor == 'dependabot[bot]' && github.event_name == 'push'
        run: |
          if git diff --quiet -- dist; then
            echo "No changes to dist"
          else
            git config user.name "dependabot[bot]"
            git config user.email "dependabot[bot]@users.noreply.github.com"
            git add dist/
            git commit -m "chore: regenerate dist bundle"
            git push
          fi

      - name: Verify committed bundle is current
        run: git diff --exit-code -- dist

      - name: Create package fixture
        run: |
          dotnet new classlib --framework net8.0 --name MyLibrary --output .tmp/ci-fixture/MyLibrary
          dotnet new xunit --framework net8.0 --name MyLibrary.SmokeTests --output .tmp/ci-fixture/MyLibrary.SmokeTests --no-restore
          dotnet add .tmp/ci-fixture/MyLibrary.SmokeTests/MyLibrary.SmokeTests.csproj package MyLibrary --version 1.0.0 --no-restore

      - name: Smoke test local action
        uses: ./
        with:
          package-projects: .tmp/ci-fixture/MyLibrary/MyLibrary.csproj
          smoke-projects: .tmp/ci-fixture/MyLibrary.SmokeTests/MyLibrary.SmokeTests.csproj
          artifacts-directory: .tmp/artifacts
          local-feed-directory: .tmp/feed

      - name: Audit production dependencies
        run: npm audit --omit=dev