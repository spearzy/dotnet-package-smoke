name: .NET Package Smoke Tests
description: Test your NuGet packages the way consumers install them.
author: dotnet-package-smoke contributors

branding:
  icon: package
  color: blue
  
inputs:
  package-projects:
    description: Projects to pack. Supports multiline values, comma-separated values, and globs.
    required: true

  generated-consumers:
    description: Create generated temporary consumer projects.
    required: false
    default: "true"

  consumer-target-frameworks:
    description: Target frameworks used for generated consumer projects.
    required: false
    default: net8.0

  consumer-project-type:
    description: Generated consumer project type. One of classlib or console.
    required: false
    default: classlib

  consumer-mode:
    description: Generated consumer package scope. One of combined or per-package.
    required: false
    default: combined

  smoke-projects:
    description: Optional smoke test projects to restore and test against the local feed. Supports multiline values, comma-separated values, and globs.
    required: false
  
  working-directory:
    description: Directory used to resolve project paths and globs.
    required: false
    default: "."
  configuration:
    description: .NET build configuration.
    required: false
    default: Release

  artifacts-directory:
    description: Directory where packed NuGet package artifacts are written.
    required: false
    default: .dotnet-package-smoke/artifacts

  restore-before-pack:
    description: Run dotnet restore before packing.
    required: false
    default: "true"

  build-before-pack:
    description: Run dotnet build before packing.
    required: false
    default: "true"

  pack-arguments:
    description: Additional arguments passed to dotnet pack. Supports quoted values.
    required: false

  smoke-restore-arguments:
    description: Additional arguments passed to dotnet restore for smoke projects. Supports quoted values.
    required: false

  smoke-test-arguments:
    description: Additional arguments passed to dotnet test for smoke projects. Supports quoted values.
    required: false

  retain-on-failure:
    description: Keep generated consumer and smoke project temporary workspaces when their checks fail.
    required: false
    default: "false"
  
  local-feed-directory:
    description: Directory used as the temporary local NuGet feed.
    required: false
    default: .dotnet-package-smoke/feed

outputs:
  packages-packed:
    description: Number of packages packed.

  packages-json:
    description: JSON array containing packed package metadata.
  
  local-feed-directory:
    description: Path to the local NuGet feed.

  generated-consumers-tested:
    description: Number of generated consumer projects tested.

  generated-consumers-passed:
    description: Number of generated consumer projects that passed install, restore, and build.

  generated-consumers-failed:
    description: Number of generated consumer projects that failed install, restore, or build.

  smoke-projects-tested:
    description: Number of smoke projects tested.

  smoke-projects-passed:
    description: Number of smoke projects that passed restore and test.

  smoke-projects-failed:
    description: Number of smoke projects that failed restore or test.

runs:
  using: node24
  main: dist/index.js
