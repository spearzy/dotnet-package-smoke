name: .NET Package Smoke Tests
description: Test your NuGet packages the way consumers install them.
author: dotnet-package-smoke contributors

inputs:
  package-projects:
    description: Projects to pack. This will support multiline values and globs later on
    required: true

  generated-consumers:
    description: Create generated temporary consumer projects.
    required: false
    default: "true"

  consumer-target-frameworks:
    description: Target frameworks used for generated consumer projects.
    required: false
    default: net8.0

  consumer-project-type:
    description: Generated consumer project type. One of classlib or console.
    required: false
    default: classlib
  
  working-directory:
    description: Directory used to resolve project paths and globs.
    required: false
    default: "."
  configuration:
    description: .NET build configuration.
    required: false
    default: Release

  artifacts-directory:
    description: Directory where packed NuGet package artifacts are written.
    required: false
    default: .dotnet-package-smoke/artifacts

  restore-before-pack:
    description: Run dotnet restore before packing.
    required: false
    default: "true"

  build-before-pack:
    description: Run dotnet build before packing.
    required: false
    default: "true"
  
  local-feed-directory:
    description: Directory used as the temporary local NuGet feed.
    required: false
    default: .dotnet-package-smoke/feed

outputs:
  packages-packed:
    description: Number of packages packed.
  
  local-feed-directory:
    description: Path to the local NuGet feed.

  generated-consumers-tested:
    description: Number of generated consumer projects tested.

  generated-consumers-passed:
    description: Number of generated consumer projects that passed install, restore, and build.

  generated-consumers-failed:
    description: Number of generated consumer projects that failed install, restore, or build.

runs:
  using: node24
  main: dist/index.js
